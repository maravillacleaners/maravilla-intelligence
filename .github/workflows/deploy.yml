name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Run tests
        run: npm test
        continue-on-error: true

  deploy-vps:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 72.61.92.220 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_rsa root@72.61.92.220 << 'EOF'
          cd /root/maravilla-intelligence
          git fetch origin
          git checkout main
          git pull origin main
          docker-compose down
          docker-compose up -d
          echo "✅ Deployment complete"
          docker ps
          EOF

      - name: Verify endpoints
        run: |
          sleep 10
          curl -s http://72.61.92.220:3002/api/discovery/naics?q=property | jq .success
          curl -s http://72.61.92.220:3002/api/discovery/watches | jq .success
        continue-on-error: true
